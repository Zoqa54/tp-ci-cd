name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Aller dans le bon dossier
      - name: Install dependencies
        working-directory: app
        run: npm ci

      # TEST
      - name: Run tests
        working-directory: app
        run: npm test

      # PACKAGE
      - name: Package application
        run: tar -czf app.tar.gz app/
